version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campusconnect-db
    restart: always
    environment:
      POSTGRES_USER: campus_admin
      POSTGRES_PASSWORD: secretpassword123
      POSTGRES_DB: campusconnect_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusconnect-backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://campus_admin:secretpassword123@db:5432/campusconnect_db
      JWT_SECRET: my-super-secret-jwt-key
      PORT: 5000
    ports:
      - "5050:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campusconnect-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
